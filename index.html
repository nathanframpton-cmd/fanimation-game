<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fan Smash — Fanimation</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0f;--accent:#c8a96e;--accent-dim:rgba(200,169,110,0.15);--text:#e8e4dc;--text-dim:rgba(232,228,220,0.4)}
html,body{width:100%;height:100%;background:var(--bg);overflow:hidden;font-family:'DM Mono',monospace;color:var(--text);user-select:none}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;padding:28px 36px;z-index:100;pointer-events:none}
#brand{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim)}
#score-block{text-align:right}
#score-label{font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:var(--text-dim);margin-bottom:4px}
#score{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:42px;color:var(--accent);line-height:1;transition:transform .1s}
#score.pop{transform:scale(1.15)}
#object-picker{position:fixed;bottom:36px;left:50%;transform:translateX(-50%);display:flex;gap:16px;z-index:100;pointer-events:all}
.obj-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:10px 20px;cursor:pointer;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.obj-btn:hover{border-color:rgba(200,169,110,.3);color:var(--text);background:rgba(200,169,110,.06)}
.obj-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
.obj-btn .icon{font-size:20px}
.obj-btn .weight{font-size:9px;letter-spacing:.2em;opacity:.5}
#restart-btn{position:fixed;bottom:36px;right:36px;background:none;border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:10px 22px;cursor:pointer;color:var(--text-dim);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;transition:all .2s;z-index:100}
#restart-btn:hover{border-color:var(--accent);color:var(--accent)}
#hint{position:fixed;bottom:108px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--text-dim);z-index:100;pointer-events:none;transition:opacity .6s}
canvas{display:block;position:fixed;top:0;left:0}
#combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cormorant Garamond',serif;font-weight:300;font-size:80px;color:var(--accent);pointer-events:none;opacity:0;z-index:200;white-space:nowrap}
</style>
</head>
<body>
<div id="ui">
  <div id="brand">Fanimation</div>
  <div id="score-block"><div id="score-label">Score</div><div id="score">0</div></div>
</div>
<canvas id="c"></canvas>
<div id="hint">Click anywhere to throw</div>
<div id="object-picker">
  <button class="obj-btn active" data-type="apple"><span class="icon">🍎</span><span>Apple</span><span class="weight">Light</span></button>
  <button class="obj-btn" data-type="mug"><span class="icon">☕</span><span>Mug</span><span class="weight">Medium</span></button>
  <button class="obj-btn" data-type="ball"><span class="icon">🎳</span><span>Ball</span><span class="weight">Heavy</span></button>
</div>
<button id="restart-btn">↺ Restart</button>
<div id="combo"></div>
<script>
(function(){
var C=document.getElementById('c'),ctx=C.getContext('2d');
var sEl=document.getElementById('score'),hEl=document.getElementById('hint'),cEl=document.getElementById('combo');
var W,H;
function rsz(){W=C.width=innerWidth;H=C.height=innerHeight;}rsz();addEventListener('resize',rsz);
var score=0,sel='apple',objs=[],parts=[],hitP=0,slowT=0,hintOn=true,cTO=null;
var fan={x:0,y:0,ang:0,rpm:220,n:5,len:0,w:0,hub:0,rod:0};
function omega(){return(fan.rpm/60)*Math.PI*2;}
function iF(){fan.x=W/2;fan.y=H*.18;fan.len=Math.min(W,H)*.22;fan.w=fan.len*.22;fan.hub=fan.len*.09;fan.rod=H*.06;}
var CF={apple:{e:'🍎',r:18,m:1,res:.75,drag:.999,col:'#c0392b',pts:10,lbl:'NICE'},mug:{e:'☕',r:22,m:2.5,res:.45,drag:.998,col:'#8b7355',pts:20,lbl:'SOLID'},ball:{e:'🎳',r:28,m:6,res:.25,drag:.997,col:'#2c2c3a',pts:50,lbl:'POWER'}};
function launch(){
  if(hintOn){hintOn=false;hEl.style.opacity='0';}
  var c=CF[sel],lx=W/2+(Math.random()-.5)*W*.15,ly=H*.88;
  var dx=fan.x-lx+(Math.random()-.5)*80,dy=fan.y-ly,d=Math.hypot(dx,dy),spd=14+Math.random()*3;
  objs.push({c:c,x:lx,y:ly,vx:(dx/d)*spd*.35+(Math.random()-.5)*1.5,vy:(dy/d)*spd,a:Math.random()*Math.PI*2,spin:(Math.random()-.5)*.25,alpha:1,ft:0});
}
function bp(b,ang){
  var a=ang+(b/fan.n)*Math.PI*2,ca=Math.cos(a),sa=Math.sin(a),pc=Math.cos(a+Math.PI/2),ps=Math.sin(a+Math.PI/2);
  var tx=fan.x+ca*fan.len,ty=fan.y+sa*fan.len,rx=fan.x+ca*fan.hub,ry=fan.y+sa*fan.hub,hw=fan.w/2,h2=hw*.3;
  return [{x:rx+pc*hw,y:ry+ps*hw},{x:tx+pc*h2,y:ty+ps*h2},{x:tx-pc*h2,y:ty-ps*h2},{x:rx-pc*hw,y:ry-ps*hw}];
}
function cs(px,py,ax,ay,bx,by){var abx=bx-ax,aby=by-ay,t=Math.max(0,Math.min(1,((px-ax)*abx+(py-ay)*aby)/(abx*abx+aby*aby)));return{x:ax+t*abx,y:ay+t*aby};}
function cp(cx,cy,r,pts){
  var md=1e9,cn=null;
  for(var i=0;i<pts.length;i++){var a=pts[i],b=pts[(i+1)%pts.length],p=cs(cx,cy,a.x,a.y,b.x,b.y),dx=cx-p.x,dy=cy-p.y,d=Math.hypot(dx,dy);if(d<md){md=d;cn=d>0?{x:dx/d,y:dy/d}:{x:0,y:-1};}}
  return md<r?{dep:r-md,nx:cn.x,ny:cn.y}:null;
}
function sp(x,y,n,col,big){for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,s=big?(3+Math.random()*7):(1+Math.random()*4);parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(big?3:1),life:1,dec:.025+Math.random()*.03,r:big?(4+Math.random()*6):(2+Math.random()*3),col:col});}}
function addS(p,lbl){score+=p;sEl.textContent=score;sEl.classList.remove('pop');void sEl.offsetWidth;sEl.classList.add('pop');setTimeout(function(){sEl.classList.remove('pop');},150);if(cTO)clearTimeout(cTO);cEl.textContent=lbl;cEl.style.opacity='1';cEl.style.transition='opacity .1s';cTO=setTimeout(function(){cEl.style.transition='opacity .8s';cEl.style.opacity='0';},400);}
function dF(ang){
  ctx.save();var g=ctx.createLinearGradient(fan.x-3,fan.y-fan.rod,fan.x+3,fan.y);g.addColorStop(0,'#333');g.addColorStop(1,'#555');ctx.fillStyle=g;ctx.fillRect(fan.x-3,fan.y-fan.rod,6,fan.rod);ctx.restore();
  for(var b=0;b<fan.n;b++){var pts=bp(b,ang);ctx.save();ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(var p=1;p<4;p++)ctx.lineTo(pts[p].x,pts[p].y);ctx.closePath();var ba=ang+(b/fan.n)*Math.PI*2,bg=ctx.createLinearGradient(fan.x,fan.y,fan.x+Math.cos(ba)*fan.len,fan.y+Math.sin(ba)*fan.len);bg.addColorStop(0,'#3a3530');bg.addColorStop(.5,'#5c5248');bg.addColorStop(1,'#3a3530');ctx.fillStyle=bg;ctx.strokeStyle='rgba(200,169,110,.15)';ctx.lineWidth=.5;ctx.fill();ctx.stroke();ctx.restore();}
  ctx.save();var hg=ctx.createRadialGradient(fan.x,fan.y,0,fan.x,fan.y,fan.hub);hg.addColorStop(0,'#7a6e60');hg.addColorStop(.6,'#4a4438');hg.addColorStop(1,'#2e2a24');ctx.beginPath();ctx.arc(fan.x,fan.y,fan.hub,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();ctx.strokeStyle='rgba(200,169,110,.3)';ctx.lineWidth=1;ctx.stroke();ctx.beginPath();ctx.arc(fan.x,fan.y,fan.hub*.25,0,Math.PI*2);ctx.fillStyle='#c8a96e';ctx.fill();ctx.restore();
}
function dBg(){ctx.fillStyle='#0e0e0f';ctx.fillRect(0,0,W,H);var ch=fan.y-fan.rod,cg=ctx.createLinearGradient(0,0,0,ch+60);cg.addColorStop(0,'#1a1a1c');cg.addColorStop(1,'#0e0e0f');ctx.fillStyle=cg;ctx.fillRect(0,0,W,ch+60);ctx.strokeStyle='rgba(200,169,110,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,ch);ctx.lineTo(W,ch);ctx.stroke();var fg=ctx.createLinearGradient(0,H-80,0,H);fg.addColorStop(0,'transparent');fg.addColorStop(1,'rgba(200,169,110,.04)');ctx.fillStyle=fg;ctx.fillRect(0,H-80,W,80);}
var lT=0,G=.45;
function loop(ts){
  requestAnimationFrame(loop);
  var dt=Math.min((ts-lT)/16.67,3);lT=ts;
  if(hitP>0){hitP-=dt;return;}
  var sc=1;if(slowT>0){slowT-=dt;sc=slowT>0?.25:1;}
  var step=dt*sc;
  fan.ang+=omega()*(step/60);
  for(var i=0;i<objs.length;i++){
    var o=objs[i];
    if(o.ft>0){o.ft-=dt;o.alpha=Math.max(0,o.ft/30);continue;}
    o.vy+=G*step;o.vx*=Math.pow(o.c.drag,step);o.x+=o.vx*step;o.y+=o.vy*step;o.a+=o.spin*step;o.spin*=.99;
    for(var b=0;b<fan.n;b++){var pts=bp(b,fan.ang),col=cp(o.x,o.y,o.c.r,pts);if(col){o.x+=col.nx*col.dep;o.y+=col.ny*col.dep;var rx=o.x-fan.x,ry=o.y-fan.y,bvx=-omega()*ry/60,bvy=omega()*rx/60,rvx=o.vx-bvx,rvy=o.vy-bvy,vR=rvx*col.nx+rvy*col.ny;if(vR<0){var j=-(1+o.c.res)*vR;o.vx+=j*col.nx;o.vy+=j*col.ny;o.vx+=bvx*.3;o.vy+=bvy*.3;o.spin+=(Math.random()-.5)*.6*(1/o.c.m);var iv=Math.abs(vR);if(iv>6){sp(o.x,o.y,12,o.c.col,true);hitP=3;slowT=18;addS(Math.round(o.c.pts*(iv/5)),o.c.lbl+'!');}else{sp(o.x,o.y,5,o.c.col,false);addS(o.c.pts,o.c.lbl);}}}}
    var pad=o.c.r+10;if(o.y>H+pad||o.x<-pad||o.x>W+pad){if(o.ft===0)o.ft=30;}
  }
  objs=objs.filter(function(o){return o.alpha>0||(o.ft===0&&o.y<H+100);});
  for(var i=0;i<parts.length;i++){var p=parts[i];p.vy+=.12*step;p.x+=p.vx*step;p.y+=p.vy*step;p.life-=p.dec*step;}
  parts=parts.filter(function(p){return p.life>0;});
  dBg();
  for(var i=0;i<parts.length;i++){var p=parts[i];ctx.save();ctx.globalAlpha=p.life*.9;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.col;ctx.fill();ctx.restore();}
  dF(fan.ang);
  for(var i=0;i<objs.length;i++){var o=objs[i];ctx.save();ctx.globalAlpha=o.alpha;ctx.translate(o.x,o.y);ctx.rotate(o.a);ctx.font=(o.c.r*2)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(o.c.e,0,0);ctx.restore();}
  if(slowT>0){ctx.save();var v=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.8);v.addColorStop(0,'transparent');v.addColorStop(1,'rgba(200,169,110,.06)');ctx.fillStyle=v;ctx.fillRect(0,0,W,H);ctx.restore();}
}
C.addEventListener('click',launch);
document.querySelectorAll('.obj-btn').forEach(function(btn){btn.addEventListener('click',function(e){e.stopPropagation();document.querySelectorAll('.obj-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');sel=btn.dataset.type;});});
document.getElementById('restart-btn').addEventListener('click',function(e){e.stopPropagation();objs=[];parts=[];score=0;sEl.textContent='0';hitP=0;slowT=0;hintOn=true;hEl.style.opacity='1';});
iF();addEventListener('resize',iF);requestAnimationFrame(loop);
}());
</script>
</body>
</html>
